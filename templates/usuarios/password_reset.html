{% extends 'base.html' %}
{% block title %}Redefinir Senha – App de Fiado{% endblock %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:#f0f4f8;">
  <div class="card shadow-sm" style="width:100%; max-width:420px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-lock-fill fs-1 text-primary"></i>
        <h4 class="mt-2 fw-bold">Esqueci minha senha</h4>
        <p class="text-muted small">Informe o e-mail cadastrado. Enviaremos um link para redefinir sua senha.</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">E-mail</label>
          <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-envelope me-1"></i> Enviar link de redefinição
        </button>
      </form>

      <hr class="my-3">
      <div class="text-center">
        <a href="{% url 'login' %}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Voltar ao login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
