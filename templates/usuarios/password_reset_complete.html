{% extends 'base.html' %}
{% block title %}Senha Redefinida – App de Fiado{% endblock %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:#f0f4f8;">
  <div class="card shadow-sm" style="width:100%; max-width:420px;">
    <div class="card-body p-4 text-center">
      <i class="bi bi-check-circle-fill fs-1 text-success"></i>
      <h4 class="mt-2 fw-bold">Senha redefinida!</h4>
      <p class="text-muted">Sua senha foi alterada com sucesso. Você já pode fazer login com a nova senha.</p>
      <a href="{% url 'login' %}" class="btn btn-primary mt-2">
        <i class="bi bi-box-arrow-in-right me-1"></i>Ir para o login
      </a>
    </div>
  </div>
</div>
{% endblock %}
