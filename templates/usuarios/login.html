{% extends 'base.html' %}
{% block title %}Login – App de Fiado{% endblock %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a2e45 0%, #2E75B6 100%);">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 16px; overflow: hidden;">
    <div class="p-4 text-center" style="background: #1F4E79;">
      <i class="bi bi-receipt-cutoff text-white" style="font-size: 2.5rem;"></i>
      <h4 class="text-white fw-bold mt-2 mb-0">App de Fiado</h4>
      <p class="text-white-50 small mb-0">Sistema de Controle de Crédito</p>
    </div>
    <div class="card-body p-4">
      <h5 class="fw-bold mb-4 text-center">Acesso ao sistema</h5>

      {% if form.errors %}
      <div class="alert alert-danger">
        <i class="bi bi-exclamation-circle me-2"></i>
        Login ou senha incorretos. Tente novamente.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Login</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Seu login" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
        <input type="hidden" name="next" value="{{ next }}">
      </form>
    </div>
  </div>
</div>
{% endblock %}
