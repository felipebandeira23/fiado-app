services:
  - type: web
    name: fiado-app
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn fiado_project.wsgi:application --workers 2 --timeout 120 --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fiado-db
          property: connectionString

databases:
  - name: fiado-db
    plan: free
