services:
  - type: web
    name: fiado-app
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
    startCommand: gunicorn fiado_project.wsgi --workers 2 --timeout 120 --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fiado-db
          property: connectionString

databases:
  - name: fiado-db
    plan: free
